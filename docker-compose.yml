services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - social_data:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  social_data:
